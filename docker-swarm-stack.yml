networks:
  homelab-shared:
    external: true

secrets:
  pihole_web_password:
    name: pihole_web_password_${ENV_NAME}
    external: true
  release_manager_github_token:
    name: release_manager_github_token_${ENV_NAME}
    external: true
  desec_token:
    name: desec_token_${ENV_NAME}_v2
    external: true
  pocket_id_encryption_key:
    name: pocket_id_encryption_key_${ENV_NAME}
    external: true

configs:
  # pihole_custom_dns is unused (kept only because swarm configs are
  # immutable and this file/config pointer predates the rename); remove
  # it in a separate piece of work once pihole_custom_dns_v2 is confirmed
  # working.
  pihole_custom_dns:
    file: ./pihole/${ENV_NAME}/etc/dnsmasq.d/02-custom-dns.conf
  pihole_custom_dns_v2:
    file: ./pihole/${ENV_NAME}/etc/dnsmasq.d/02-custom-dns-v2.conf

services:
  pihole:
    image: pihole/pihole:${PIHOLE_VERSION}
    environment:
      TZ: 'Europe/London'
      WEBPASSWORD_FILE: '/run/secrets/pihole_web_password'
      FTLCONF_dns_listeningMode: 'all'
      FTLCONF_misc_etc_dnsmasq_d: 'true'
      FTLCONF_dns_upstreams: '1.1.1.1;8.8.8.8'
      FTLCONF_files_macvendor: '/macvendor.db'
    dns:
      - 1.1.1.1
      - 8.8.8.8
    tmpfs:
      - /etc/pihole
    configs:
      - source: pihole_custom_dns_v2
        target: /etc/dnsmasq.d/02-custom-dns.conf
        mode: 0644
    secrets:
      - pihole_web_password
    ports:
      - "${PIHOLE_DNS_PORT}:53/tcp"
      - "${PIHOLE_DNS_PORT}:53/udp"
    cap_add:
      - NET_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - homelab-shared
    deploy:
      replicas: ${PIHOLE_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
        - "traefik.enable=true"
        - "traefik.http.routers.pihole-${ENV_NAME}.rule=Host(`pihole.${DOMAIN_SUFFIX}`)"
        - "traefik.http.routers.pihole-${ENV_NAME}.tls=true"
        - "traefik.http.routers.pihole-${ENV_NAME}.tls.certresolver=desec"
        - "traefik.http.routers.pihole-${ENV_NAME}.tls.domains[0].main=${DOMAIN_SUFFIX}"
        - "traefik.http.routers.pihole-${ENV_NAME}.tls.domains[0].sans=*.${DOMAIN_SUFFIX}"
        - "traefik.http.services.pihole-${ENV_NAME}.loadbalancer.server.port=80"
        - "traefik.http.middlewares.compression-pihole-${ENV_NAME}.compress=true"
        - "traefik.http.routers.pihole-${ENV_NAME}.middlewares=compression-pihole-${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == rpi-3
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_VERSION}
    ports:
      - "${JELLYFIN_HTTP_PORT}:8096"
      - "${JELLYFIN_DLNA_PORT}:1900/udp"
      - "${JELLYFIN_DISCOVERY_PORT}:7359/udp"
    volumes:
      - /var/cache/${ENV_NAME}/jellyfin:/cache
      - /srv/data/${ENV_NAME}/jellyfin/config:/config
      - /srv/data/${ENV_NAME}/jellyfin/Music:/Music
      - /srv/data/${ENV_NAME}/jellyfin/Movies:/Movies
      - /srv/data/${ENV_NAME}/jellyfin/TV:/TV
      - /srv/data/${ENV_NAME}/jellyfin/ChildrensMovies:/ChildrensMovies
      - /srv/data/${ENV_NAME}/jellyfin/ChildrensClips:/ChildrensClips
      - /srv/data/${ENV_NAME}/jellyfin/ChildrensTV:/ChildrensTV
      - /srv/data/${ENV_NAME}/jellyfin/Classical:/Classical
    tmpfs:
      - /tmp/jellyfin
    networks:
      - homelab-shared
    deploy:
      replicas: ${JELLYFIN_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
        - "traefik.enable=true"
        - "traefik.http.routers.jellyfin-${ENV_NAME}.rule=Host(`jellyfin.${DOMAIN_SUFFIX}`)"
        - "traefik.http.routers.jellyfin-${ENV_NAME}.tls=true"
        - "traefik.http.routers.jellyfin-${ENV_NAME}.tls.certresolver=desec"
        - "traefik.http.routers.jellyfin-${ENV_NAME}.tls.domains[0].main=${DOMAIN_SUFFIX}"
        - "traefik.http.routers.jellyfin-${ENV_NAME}.tls.domains[0].sans=*.${DOMAIN_SUFFIX}"
        - "traefik.http.services.jellyfin-${ENV_NAME}.loadbalancer.server.port=8096"
        - "traefik.http.middlewares.compression-jellyfin-${ENV_NAME}.compress=true"
        - "traefik.http.middlewares.buffering-jellyfin-${ENV_NAME}.buffering.maxRequestBodyBytes=10000000"
        - "traefik.http.middlewares.buffering-jellyfin-${ENV_NAME}.buffering.memRequestBodyBytes=2000000"
        - "traefik.http.middlewares.buffering-jellyfin-${ENV_NAME}.buffering.maxResponseBodyBytes=10000000"
        - "traefik.http.middlewares.buffering-jellyfin-${ENV_NAME}.buffering.memResponseBodyBytes=2000000"
        - "traefik.http.routers.jellyfin-${ENV_NAME}.middlewares=compression-jellyfin-${ENV_NAME},buffering-jellyfin-${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == n100
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 768M


  traefik:
    image: traefik:${TRAEFIK_VERSION}
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.swarm=true"
      - "--providers.swarm.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.desec.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.desec.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.desec.acme.dnschallenge=true"
      - "--certificatesresolvers.desec.acme.dnschallenge.provider=desec"
      - "--certificatesresolvers.desec.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--log.level=INFO"
      - "--accesslog=true"
    environment:
      DESEC_TOKEN_FILE: '/run/secrets/desec_token'
      LEGO_EXPERIMENTAL_CNAME_SUPPORT: 'true'
    secrets:
      - desec_token
    ports:
      - "${TRAEFIK_HTTP_PORT}:80"
      - "${TRAEFIK_HTTPS_PORT}:443"
      - "${TRAEFIK_DASHBOARD_PORT}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/data/${ENV_NAME}/traefik/letsencrypt:/letsencrypt
    networks:
      - homelab-shared
    deploy:
      replicas: ${TRAEFIK_REPLICAS}
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == ${TRAEFIK_NODE_HARDWARE}
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:${AUDIOBOOKSHELF_VERSION}
    volumes:
      - /srv/data/${ENV_NAME}/audiobookshelf/Audiobooks:/audiobooks
      - /srv/data/${ENV_NAME}/audiobookshelf/config:/config
      - /srv/data/${ENV_NAME}/audiobookshelf/metadata:/metadata
    environment:
      TZ: 'Europe/London'
    networks:
      - homelab-shared
    deploy:
      replicas: ${AUDIOBOOKSHELF_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
        - "traefik.enable=true"
        - "traefik.http.routers.audiobookshelf-${ENV_NAME}.rule=Host(`audiobookshelf.${DOMAIN_SUFFIX}`)"
        - "traefik.http.routers.audiobookshelf-${ENV_NAME}.tls=true"
        - "traefik.http.routers.audiobookshelf-${ENV_NAME}.tls.certresolver=desec"
        - "traefik.http.routers.audiobookshelf-${ENV_NAME}.tls.domains[0].main=${DOMAIN_SUFFIX}"
        - "traefik.http.routers.audiobookshelf-${ENV_NAME}.tls.domains[0].sans=*.${DOMAIN_SUFFIX}"
        - "traefik.http.services.audiobookshelf-${ENV_NAME}.loadbalancer.server.port=80"
        - "traefik.http.middlewares.compression-audiobookshelf-${ENV_NAME}.compress=true"
        - "traefik.http.routers.audiobookshelf-${ENV_NAME}.middlewares=compression-audiobookshelf-${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == n100
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  kavita:
    image: jvmilazz0/kavita:${KAVITA_VERSION}
    volumes:
      - /srv/data/${ENV_NAME}/kavita/Books:/books
      - /srv/data/${ENV_NAME}/kavita/config:/kavita/config
    environment:
      TZ: 'Europe/London'
    networks:
      - homelab-shared
    deploy:
      replicas: ${KAVITA_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
        - "traefik.enable=true"
        - "traefik.http.routers.kavita-${ENV_NAME}.rule=Host(`kavita.${DOMAIN_SUFFIX}`)"
        - "traefik.http.routers.kavita-${ENV_NAME}.tls=true"
        - "traefik.http.routers.kavita-${ENV_NAME}.tls.certresolver=desec"
        - "traefik.http.routers.kavita-${ENV_NAME}.tls.domains[0].main=${DOMAIN_SUFFIX}"
        - "traefik.http.routers.kavita-${ENV_NAME}.tls.domains[0].sans=*.${DOMAIN_SUFFIX}"
        - "traefik.http.services.kavita-${ENV_NAME}.loadbalancer.server.port=5000"
        - "traefik.http.middlewares.compression-kavita-${ENV_NAME}.compress=true"
        - "traefik.http.routers.kavita-${ENV_NAME}.middlewares=compression-kavita-${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == n100
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M

  pocket-id:
    image: pocketid/pocket-id:${POCKET_ID_VERSION}
    environment:
      TZ: 'Europe/London'
      APP_URL: 'https://pocket-id.${DOMAIN_SUFFIX}'
      TRUST_PROXY: 'true'
      ENCRYPTION_KEY_FILE: '/run/secrets/pocket_id_encryption_key'
    secrets:
      - pocket_id_encryption_key
    volumes:
      - /srv/data/${ENV_NAME}/pocket-id/data:/app/data
    healthcheck:
      test: [ "CMD", "/app/pocket-id", "healthcheck" ]
      interval: 1m30s
      timeout: 5s
      retries: 2
      start_period: 10s
    networks:
      - homelab-shared
    deploy:
      replicas: ${POCKET_ID_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
        - "traefik.enable=true"
        - "traefik.http.routers.pocket-id-${ENV_NAME}.rule=Host(`pocket-id.${DOMAIN_SUFFIX}`)"
        - "traefik.http.routers.pocket-id-${ENV_NAME}.tls=true"
        - "traefik.http.routers.pocket-id-${ENV_NAME}.tls.certresolver=desec"
        - "traefik.http.routers.pocket-id-${ENV_NAME}.tls.domains[0].main=${DOMAIN_SUFFIX}"
        - "traefik.http.routers.pocket-id-${ENV_NAME}.tls.domains[0].sans=*.${DOMAIN_SUFFIX}"
        - "traefik.http.services.pocket-id-${ENV_NAME}.loadbalancer.server.port=1411"
        - "traefik.http.middlewares.compression-pocket-id-${ENV_NAME}.compress=true"
        - "traefik.http.routers.pocket-id-${ENV_NAME}.middlewares=compression-pocket-id-${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == rpi-3
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  trek:
    image: mauriceboe/trek:${TREK_VERSION}
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    environment:
      NODE_ENV: 'production'
      PORT: '3000'
      TZ: 'Europe/London'
      LOG_LEVEL: 'info'
      APP_URL: 'https://trek.${DOMAIN_SUFFIX}'
    volumes:
      - /srv/data/${ENV_NAME}/trek/data:/app/data
      - /srv/data/${ENV_NAME}/trek/uploads:/app/uploads
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - homelab-shared
    deploy:
      replicas: ${TREK_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
        - "traefik.enable=true"
        - "traefik.http.routers.trek-${ENV_NAME}.rule=Host(`trek.${DOMAIN_SUFFIX}`)"
        - "traefik.http.routers.trek-${ENV_NAME}.tls=true"
        - "traefik.http.routers.trek-${ENV_NAME}.tls.certresolver=desec"
        - "traefik.http.routers.trek-${ENV_NAME}.tls.domains[0].main=${DOMAIN_SUFFIX}"
        - "traefik.http.routers.trek-${ENV_NAME}.tls.domains[0].sans=*.${DOMAIN_SUFFIX}"
        - "traefik.http.services.trek-${ENV_NAME}.loadbalancer.server.port=3000"
        - "traefik.http.middlewares.compression-trek-${ENV_NAME}.compress=true"
        - "traefik.http.routers.trek-${ENV_NAME}.middlewares=compression-trek-${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == n100
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M


