networks:
  homelab-shared:
    external: true

secrets:
  pihole_web_password:
    name: pihole_web_password_${ENV_NAME}
    external: true
  release_manager_github_token:
    name: release_manager_github_token_${ENV_NAME}
    external: true

configs:
  pihole_custom_dns:
    file: ./pihole/${ENV_NAME}/etc/dnsmasq.d/02-custom-dns.conf
  pihole_config:
    file: ./pihole/${ENV_NAME}/etc/pihole/pihole.toml
  nginx_config:
    file: ./nginx/nginx.${ENV_NAME}.conf

services:
  pihole:
    image: pihole/pihole:${PIHOLE_VERSION}
    environment:
      TZ: 'Europe/London'
      WEBPASSWORD_FILE: '/run/secrets/pihole_web_password'
      FTLCONF_dns_listeningMode: 'all'
      FTLCONF_misc_etc_dnsmasq_d: 'true'
      FTLCONF_dns_upstreams: '1.1.1.1;8.8.8.8'
    dns:
      - 1.1.1.1
      - 8.8.8.8
    tmpfs:
      - /etc/pihole
    configs:
      - source: pihole_custom_dns
        target: /etc/dnsmasq.d/02-custom-dns.conf
        mode: 0644
      - source: pihole_config
        target: /etc/pihole/pihole.toml
        mode: 0644
    secrets:
      - pihole_web_password
    ports:
      - "${PIHOLE_DNS_PORT}:53/tcp"
      - "${PIHOLE_DNS_PORT}:53/udp"
    cap_add:
      - NET_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - homelab-shared
    deploy:
      replicas: ${PIHOLE_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == rpi-3
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  jellyfin:
    image: jellyfin/jellyfin:${JELLYFIN_VERSION}
    ports:
      - "${JELLYFIN_HTTP_PORT}:8096"
      - "${JELLYFIN_DLNA_PORT}:1900/udp"
      - "${JELLYFIN_DISCOVERY_PORT}:7359/udp"
    volumes:
      - /var/cache/${ENV_NAME}/jellyfin:/cache
      - /srv/data/${ENV_NAME}/jellyfin/config:/config
      - /srv/data/${ENV_NAME}/jellyfin/Music:/Music
      - /srv/data/${ENV_NAME}/jellyfin/Movies:/Movies
      - /srv/data/${ENV_NAME}/jellyfin/TV:/TV
      - /srv/data/${ENV_NAME}/jellyfin/ChildrensMovies:/ChildrensMovies
      - /srv/data/${ENV_NAME}/jellyfin/ChildrensClips:/ChildrensClips
      - /srv/data/${ENV_NAME}/jellyfin/ChildrensTV:/ChildrensTV
      - /srv/data/${ENV_NAME}/jellyfin/Classical:/Classical
    tmpfs:
      - /tmp/jellyfin
    networks:
      - homelab-shared
    deploy:
      replicas: ${JELLYFIN_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == n100
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 768M

  nginx:
    image: nginx:${NGINX_VERSION}
    ports:
      - "${NGINX_HTTP_PORT}:80"
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
        mode: 0644
    networks:
      - homelab-shared
    deploy:
      replicas: ${NGINX_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == ${NGINX_NODE_HARDWARE}
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  audiobookshelf:
    image: ghcr.io/advplyr/audiobookshelf:${AUDIOBOOKSHELF_VERSION}
    volumes:
      - /srv/data/${ENV_NAME}/audiobookshelf/Audiobooks:/audiobooks
      - /srv/data/${ENV_NAME}/audiobookshelf/config:/config
      - /srv/data/${ENV_NAME}/audiobookshelf/metadata:/metadata
    environment:
      TZ: 'Europe/London'
    networks:
      - homelab-shared
    deploy:
      replicas: ${AUDIOBOOKSHELF_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == n100
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  kavita:
    image: jvmilazz0/kavita:${KAVITA_VERSION}
    volumes:
      - /srv/data/${ENV_NAME}/kavita/Books:/books
      - /srv/data/${ENV_NAME}/kavita/config:/kavita/config
    environment:
      TZ: 'Europe/London'
    networks:
      - homelab-shared
    deploy:
      replicas: ${KAVITA_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == n100
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 384M

  wikijs:
    image: requarks/wiki:${WIKIJS_VERSION}
    user: root
    volumes:
      - /srv/data/${ENV_NAME}/wikijs/data:/wiki/data
    environment:
      DB_TYPE: sqlite
      DB_FILEPATH: /wiki/data/wiki.db
    networks:
      - homelab-shared
    deploy:
      replicas: ${WIKIJS_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == n100
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  release-manager:
    image: ghcr.io/oscar-barlow/release-manager:${RELEASE_MANAGER_VERSION}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /srv/data/${ENV_NAME}/release-manager/data:/app/data
    environment:
      ENV_NAME: '${ENV_NAME}'
      STUB_MODE: '${RELEASE_MANAGER_STUB_MODE}'
      GITHUB_REPO: '${RELEASE_MANAGER_GITHUB_REPO}'
      GITHUB_TOKEN_FILE: '/run/secrets/release_manager_github_token'
      DOCKER_HOST: 'unix:///var/run/docker.sock'
      DATABASE_PATH: '/app/data/release_manager.db'
      DEPLOYMENT_TIMEOUT_SECONDS: 300
      HEALTH_CHECK_INTERVAL_SECONDS: 5
      WEB_HOST: '0.0.0.0'
      WEB_PORT: 8080
      POLL_INTERVAL_SECONDS: 60
    secrets:
      - release_manager_github_token
    networks:
      - homelab-shared
    deploy:
      replicas: ${RELEASE_MANAGER_REPLICAS}
      labels:
        - "env=${ENV_NAME}"
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.hardware == n100
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
